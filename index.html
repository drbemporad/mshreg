hts in advance of furnishing or discontinuing patient care whenever possible. Notice must be provided before care is furnished, unless it is an emergency. The hospital must document that the patient or representative was informed."},{"type":"std","text":"§ 482.13(b) — Exercise of Rights"},{"type":"p","text":"The patient or, as permitted by State law, the patient's representative has the right to make informed decisions regarding care. The hospital must establish a clear policy on patient representatives. Patient representatives may exercise patient rights only to the extent permitted by State law. The hospital must comply with patient advance directives and must not condition care or discriminate against patients based on the presence or absence of an advance directive."},{"type":"std","text":"§ 482.13(c) — Privacy and Safety (A-0143–A-0154)"},{"type":"p","text":"Patients have the right to personal privacy and to receive care in a safe setting free from all forms of abuse, neglect, and harassment. The hospital must prohibit and take actions to prevent restraint and seclusion (physical and chemical) from being used as a means of coercion, discipline, convenience, or retaliation. Restraint and seclusion may be used only when less restrictive interventions have been determined to be ineffective to protect the patient or others from harm."},{"type":"std","text":"§ 482.13(e) — Restraint or Seclusion (A-0167–A-0207)"},{"type":"p","text":"Restraint or seclusion may only be used when: (1) less restrictive interventions have been determined to be ineffective; (2) a patient's behavior is an immediate and serious danger to him/herself or others; (3) written protocols are in place; (4) a physician or LIP orders the restraint or seclusion; (5) there is ongoing monitoring of the patient by trained staff. All deaths associated with use of restraint or seclusion must be reported to CMS. Restraint or seclusion must be discontinued at the earliest possible time, regardless of the length of time specified in the order."},{"type":"std","text":"§ 482.13(f) — Seclusion in Psychiatric Settings (A-0208–A-0217)"},{"type":"p","text":"In psychiatric inpatient settings, additional requirements apply: a face-to-face evaluation by a physician or LIP must occur within one hour of initiation; a registered nurse trained per § 482.13(f)(2)(ii) may conduct the one-hour evaluation; original orders may not exceed 4 hours for adults, 2 hours for children 9–17, or 1 hour for children under 9; orders must not be written as standing or PRN orders."},{"type":"std","text":"§ 482.13(g) — Death Reporting (A-0218)"},{"type":"p","text":"The hospital must report to CMS any death that occurs while a patient is in restraint or seclusion, within one hour of restraint/seclusion, or within 24 hours of removal from restraint or seclusion if there is reasonable suspicion that the use of restraint or seclusion contributed to the patient's death."},{"type":"std","text":"§ 482.13(h) — Advance Directives (A-0246–A-0249)"},{"type":"p","text":"The hospital must maintain written policies and procedures for advance directives, inform all adult patients of their rights regarding advance directives at the time of admission, document in the medical record whether an advance directive exists, not condition care on the presence or absence of an advance directive, and not discriminate against patients based on advance directive status. If the hospital cannot implement a patient's advance directive due to conscience, it must inform the patient and ensure the patient is transferred as necessary."}]},{"id":"ig-482-15","citation":"§ 482.15","title":"Emergency Preparedness","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must comply with all applicable Federal, State, and local emergency preparedness requirements. The hospital must establish and maintain a comprehensive emergency preparedness program designed to ensure the safety and well-being of each patient during an emergency."},{"type":"p","text":"The emergency preparedness program must include: (1) a risk assessment and emergency plan that includes strategies for addressing emergency events identified by the risk assessment; (2) policies and procedures; (3) a communication plan; and (4) a training and testing program. The emergency plan must be reviewed and updated at least every 2 years."},{"type":"p","text":"The communication plan must include a system for communicating with hospital staff, the State and local public health department, other healthcare providers, and patients and their families. The hospital must maintain a list of the hospital's occupants as well as contact information for other healthcare facilities to facilitate interagency communication."},{"type":"sp","text":"Training and Testing Requirements"},{"type":"sp_p","text":"The hospital must conduct training that includes simulation exercises of emergencies. Annual training must include full-scale exercises that are community-based or individual facility-based functional exercises. The hospital must analyze the results of each exercise and make improvements as necessary. Staff must be trained in their roles within the emergency plan."}]},{"id":"ig-482-21","citation":"§ 482.21","title":"Quality Assessment and Performance Improvement (QAPI)","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital's QAPI program must reflect the complexity of its organization and services; involve all hospital departments and services including those under contract or arrangement; and focus on indicators related to improved health outcomes and prevention and reduction of medical errors. The hospital must maintain and demonstrate evidence of its QAPI program for review by CMS."},{"type":"p","text":"The program must include an ongoing program showing measurable improvement in indicators for which there is evidence that improvement will lead to better health outcomes. The hospital must measure, analyze, and track quality indicators including adverse patient events and other performance aspects that assess processes of care, hospital service, and operations."},{"type":"p","text":"Key requirements: (1) The program must be facility-wide, incorporating every service and activity; (2) departments must report to and receive reports from the facility's central QAPI body; (3) the program must identify opportunities for improvement and address safety issues; (4) a patient safety program must be implemented; (5) the governing body must be periodically apprised of QAPI program activities."}]},{"id":"ig-482-22","citation":"§ 482.22","title":"Medical Staff","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The medical staff is responsible for the quality of medical care provided to patients and must be well organized with bylaws, rules, and regulations. The medical staff must be accountable to the governing body. At minimum, the medical staff must be composed of MDs or DOs; other practitioners may be granted membership/privileges in accordance with State law and governing body determination."},{"type":"p","text":"Credentialing and privileging must be based on: individual character, competence, training, experience, and judgment. The hospital must have a process for ongoing professional practice evaluation (OPPE) and focused professional practice evaluation (FPPE) for all practitioners with privileges. For telemedicine services, the hospital may exercise a streamlined privileging option relying on the distant-site hospital's or telemedicine entity's credentialing decisions."},{"type":"p","text":"The medical staff must have an identifiable leader (or leaders) assigned responsibility for the organization and conduct of the medical staff. Medical staff oversight functions must include: reviewing and acting on information from the QAPI program; enforcing its bylaws; providing information about quality of care to the governing body; and taking action to address identified quality problems."}]},{"id":"ig-482-23","citation":"§ 482.23","title":"Nursing Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have an organized nursing service that provides 24-hour nursing care to patients. A registered nurse must supervise and evaluate the nursing care for each patient and be immediately available for bedside care of any patient. The nursing service must be directed by a qualified RN (Director of Nursing)."},{"type":"p","text":"Staffing requirements: Nursing personnel must be sufficient to provide nursing care to all patients as needed. The charge nurse of each unit must be an RN. A licensed practical nurse or registered professional nurse must be on duty at all times. Personnel on all shifts must be licensed as required by State law."},{"type":"p","text":"Drug administration: Drugs and biologicals must be prepared and administered in accordance with Federal and State laws and the medical staff's approved policies and procedures. Only personnel authorized under State law may administer drugs and biologicals. Transfusions must be preceded by informed consent and may be administered only in accordance with State law and accepted standards of practice."},{"type":"p","text":"Patient care planning: Each patient must have a nursing care plan reflecting the patient's care needs. Nursing staff must assess patients' nursing care needs and ensure that nursing care plans are developed, implemented, and revised as needed."}]},{"id":"ig-482-24","citation":"§ 482.24","title":"Medical Record Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have a medical record service with administrative responsibility for medical records. A medical record must be maintained for every inpatient and outpatient. Medical records must be accurately written, promptly completed, properly filed and retained, and accessible."},{"type":"p","text":"Content requirements: Every medical record must contain: patient identification data; admission date; history and physical; chief complaint; details of examination and findings; final diagnosis with completion of medical records within 30 days following patient discharge; all practitioners' orders; nursing notes; reports of procedures and tests; medication administration records; and discharge summary."},{"type":"p","text":"Authentication: All entries must be legible and complete, and must be authenticated and dated promptly by the person (identified by name and discipline) responsible for ordering, providing, or evaluating the service furnished. Verbal orders must be authenticated by the author within the time frame specified by hospital medical staff policy."},{"type":"p","text":"Retention: The hospital must retain records for the period required by State law; if no State law governs, records must be retained for at least five years, or in the case of minors, three years after reaching majority under State law."}]},{"id":"ig-482-25","citation":"§ 482.25","title":"Pharmaceutical Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have pharmaceutical services that meet the needs of patients, directed by a registered pharmacist. Pharmacy and therapeutics functions must be organized to ensure appropriate and rational drug use. The pharmacy must be staffed with sufficient pharmacists and support personnel."},{"type":"p","text":"Drug storage and control: Drugs must be controlled and distributed in accordance with applicable State and Federal laws and regulations. All drugs and biologicals must be kept in a secure area. Medications requiring refrigeration must be stored at appropriate temperatures. Controlled substances must be stored in locked areas and inventoried according to Federal and State requirements."},{"type":"p","text":"Medication orders: Drug orders must be issued only by practitioners with prescribing authority under State law. The hospital must review the medication regimen of each patient. Drug errors, adverse drug reactions, and incompatibilities must be reported to the attending physician. Automatic stop orders must comply with medical staff policy."},{"type":"p","text":"Formulary and drug use evaluation: The pharmacy and therapeutics committee (or equivalent) must oversee hospital formulary development and drug use evaluation. There must be a process for evaluating new medications and monitoring high-alert medications. The hospital must provide pharmaceutical information to physicians and hospital staff."}]},{"id":"ig-482-26","citation":"§ 482.26","title":"Radiologic Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"If the hospital provides radiologic services, they must meet the needs of patients in accordance with acceptable standards of practice. The services must be provided by, or under the supervision of, a qualified radiologist or other qualified practitioner licensed under applicable State law. Radiological services must be available 7 days per week and at night if the hospital provides emergency care."},{"type":"p","text":"Safety: The radiologic services must have radiation safety policies and procedures. Personnel performing radiologic services must be adequately trained and wear radiation dose monitoring devices as required. Equipment must be maintained in safe working order and calibrated according to applicable standards."},{"type":"p","text":"Reports: All radiologic examinations must be interpreted by, or in consultation with, a qualified radiologist. Written reports of the radiologist's interpretation must be provided to the requesting practitioner and maintained in the patient's medical record."}]},{"id":"ig-482-27","citation":"§ 482.27","title":"Laboratory Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must maintain or have available adequate laboratory services to meet the needs of its patients. Laboratory services must be provided by a laboratory that meets the requirements of 42 CFR Part 493 (CLIA '88). Emergency laboratory services must be available 24 hours per day, seven days per week."},{"type":"p","text":"If laboratory services are not provided on-site, the hospital must have written arrangements with certified or approved laboratories. The hospital must establish evaluation and accountability mechanisms to ensure contracted laboratory services meet laboratory requirements and standards. Laboratory reports must be incorporated into the patient's medical record."},{"type":"p","text":"Blood and blood products: The hospital must have adequate blood banking services. The hospital must have policies and procedures for blood transfusions and the prevention of transfusion errors. There must be systems to identify patients and confirm blood product compatibility before administration."}]},{"id":"ig-482-28","citation":"§ 482.28","title":"Food and Dietetic Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have organized food and dietetic services directed and staffed by adequate qualified personnel. A qualified dietitian (full-time, part-time, or consulting) must be responsible for the diet therapy program. The dietetic services must be sufficient to meet the nutritional needs of patients consistent with their clinical conditions and in accordance with accepted standards of practice."},{"type":"p","text":"Nutritional care: A nutritional assessment must be performed for each patient as indicated. The dietitian must develop and approve individualized therapeutic diets when ordered. The hospital must provide special diets, including medically required diets, as required by individual patient needs. Food must be prepared using sanitary techniques and in accordance with all applicable sanitation and food safety standards."},{"type":"p","text":"Menus: Menus must meet the nutritional needs of patients in accordance with their conditions. Therapeutic diets must be prescribed by the practitioner responsible for the patient's care. Patients must have an adequate choice of food and the hospital must accommodate dietary preferences to the extent possible."}]},{"id":"ig-482-30","citation":"§ 482.30","title":"Utilization Review","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have a utilization review (UR) plan that provides for review of services furnished by the institution and by members of the medical staff to Medicare and Medicaid patients. The purpose of UR is to ensure appropriate use of hospital resources."},{"type":"p","text":"The UR plan must include: the UR committee; the scope and frequency of review; criteria to be used in review; procedures for reviewing medical necessity of admissions, extended stays, and professional services; and methods for reporting findings to the governing body and medical staff."},{"type":"p","text":"The UR committee must consist of two or more practitioners who are not regular employees of the hospital. The committee must include MDs or DOs. The medical staff or committee must conduct timely review of admissions and continued stays. Findings and recommendations must be communicated to the attending practitioner and to hospital administration."}]},{"id":"ig-482-41","citation":"§ 482.41","title":"Physical Environment","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must be constructed, arranged, and maintained to ensure the safety of the patient, and to provide facilities for diagnosis and treatment, and for special hospital services appropriate to the needs of the community. Compliance requires adherence to applicable Life Safety Code (LSC) standards and physical environment standards."},{"type":"p","text":"Life Safety Code: The hospital must meet the applicable provisions of the 2012 Life Safety Code (NFPA 101) and the 2012 Health Care Facilities Code (NFPA 99), which address fire protection, means of egress, fire alarm systems, sprinkler systems, smoking policies, and emergency power systems. LSC deficiencies are cited under the physical environment CoP."},{"type":"p","text":"Maintenance: The hospital must maintain all facilities and equipment in a manner that protects the health and safety of patients and personnel. There must be a preventive maintenance program. Emergency and standby power systems must be maintained in accordance with NFPA standards."},{"type":"p","text":"Infection control environment: The physical plant and environment must be maintained in a way that supports infection prevention and control. Proper ventilation, lighting, and sanitation must be maintained throughout the facility."}]},{"id":"ig-482-42","citation":"§ 482.42","title":"Infection Prevention and Control; Antibiotic Stewardship","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must provide a sanitary environment to avoid sources and transmission of infections and communicable diseases. There must be an active program for the prevention, control, and investigation of infections and communicable diseases. The infection control officer(s) must develop and implement policies governing control of infections and communicable diseases."},{"type":"p","text":"The infection control program must: (1) include surveillance activities to identify infection risks; (2) investigate outbreaks of infectious disease; (3) develop and monitor infection control policies and procedures; (4) conduct ongoing in-service training for all departments; (5) maintain records of infections and communicable diseases; and (6) analyze infection data for trends."},{"type":"std","text":"Antibiotic Stewardship Program"},{"type":"p","text":"The hospital must have an antibiotic stewardship program consistent with nationally recognized guidelines that includes: policies and procedures to monitor antibiotic use; education for staff and practitioners on antibiotic use; systems to identify and address adverse drug events related to antibiotic use; prevention of healthcare-associated infections (HAIs); and a leader with training and experience in antibiotic stewardship. The program must document its activities and report antibiotic use and resistance data."}]},{"id":"ig-482-43","citation":"§ 482.43","title":"Discharge Planning","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have a discharge planning process that focuses on the goals and treatment preferences of the patient. The discharge planning process must be consistent with the patient's goals for care and treatment preferences, ensure an effective transition from hospital to post-discharge care, and reduce factors leading to preventable adverse events after discharge."},{"type":"p","text":"Assessment: The hospital must identify, early in the patient's admission, those patients likely to suffer adverse health consequences upon discharge if there is no planning for post-discharge care. A discharge planning evaluation must be performed for all patients and must begin within 24 hours of admission. The evaluation must include an assessment of the patient's likely need for appropriate post-acute services."},{"type":"p","text":"Patient/family involvement: The hospital must involve the patient and family/support persons in the discharge planning process and must ensure they have sufficient information about post-discharge care options. The hospital must disclose required information regarding choices for post-acute care services that meet the patient's needs and goals for care."},{"type":"p","text":"Referral and transfer: The hospital must arrange for the initial implementation of the discharge plan and must reassess the plan as the patient's condition changes. The hospital must transfer to the appropriate post-acute service provider with all necessary medical information and must not limit or restrict referral options to post-acute providers."}]},{"id":"ig-482-45","citation":"§ 482.45","title":"Organ, Tissue and Eye Procurement","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"The hospital must have and implement written protocols that: (1) incorporate an agreement with an Organ Procurement Organization (OPO) designated under 42 CFR Part 486; (2) incorporate an agreement with at least one tissue bank and at least one eye bank; (3) ensure that potential donors are identified and referred to the OPO in a timely manner; (4) ensure that the hospital works cooperatively with the designated OPO, tissue bank, and eye bank in the donation and procurement process."},{"type":"p","text":"Notification: The hospital must notify the OPO in a timely manner about all individuals whose death is imminent or who have died in the hospital. Written agreements must describe each party's responsibilities in the donation process and must ensure that the hospital's OPO-designated service area is covered."},{"type":"p","text":"Consent: The hospital must ensure that the family or next-of-kin of potential organ/tissue/eye donors is informed of the option to donate and is referred to the OPO for further information. The hospital must have a protocol for ensuring that all families of potential donors are offered the opportunity to donate. Donation must not compromise the medical care of a patient."}]},{"id":"ig-482-56","citation":"§ 482.56","title":"Rehabilitation Services","tag":"general","source":"SOM Appendix A","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_a_hospitals.pdf","body":[{"type":"std","text":"Condition-Level Guidance"},{"type":"p","text":"If the hospital provides rehabilitation services, the services must meet the needs of patients in accordance with acceptable standards of practice. The scope and organization of rehabilitation services must be appropriate to the needs of the patients served and must include appropriate policies and procedures."},{"type":"std","text":"§ 482.56(a) — Organization and Staffing"},{"type":"para","text":"(a)(1) Director Qualifications"},{"type":"p","text":"The rehabilitation services must be directed by a qualified professional who meets applicable regulations and standards for professional practice in the specific therapy discipline. The director must have training and experience in the specific rehabilitation discipline and in the management and administration of a rehabilitation program."},{"type":"para","text":"(a)(2) Qualified Therapists"},{"type":"p","text":"Rehabilitation services must be provided by qualified therapists, assistants, and support personnel. Therapists must be licensed or registered by the appropriate State licensing authority where State law provides for such licensing. Personnel must practice within the scope of their licensure or certification."},{"type":"std","text":"§ 482.56(b) — Delivery of Services"},{"type":"para","text":"(b)(1) Medical Record Documentation"},{"type":"p","text":"All rehabilitation services provided to patients must be documented in the patient's medical record, including: evaluation/assessment findings; treatment goals; the treatment plan; the patient's response to treatment; and progress toward goals. Documentation must reflect the individualized nature of the treatment plan and must be completed in a timely manner."},{"type":"para","text":"(b)(2) Standards of Practice"},{"type":"p","text":"Rehabilitation services must be provided in accordance with national standards of practice for the specific therapy discipline. Services must be consistent with the patient's diagnosis, needs, and goals. The rehabilitation program must coordinate with other hospital services to ensure integrated, comprehensive patient care."}]},{"id":"ig-482-60","citation":"§ 482.60","title":"Special Provisions Applying to Psychiatric Hospitals","tag":"psych","source":"SOM Appendix AA","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_aa_psyc_hospitals.pdf","body":[{"type":"std","text":"B98–B102 | Condition-Level Guidance"},{"type":"p","text":"(a) A hospital will be deemed to meet the 'primarily engaged' standard if it meets the clinical records requirement of (c) and the staffing requirements of (d)."},{"type":"p","text":"(b) The hospital must either be accredited by The Joint Commission or AOA, or independently meet the general hospital CoPs at §§ 482.1–482.23 and 482.25–482.57."},{"type":"p","text":"(c) Clinical records must be sufficient to permit CMS to determine the degree and intensity of treatment furnished to Medicare beneficiaries, as specified in § 482.61."},{"type":"p","text":"(d) Staffing requirements as specified in § 482.62 must be met."}]},{"id":"ig-482-61","citation":"§ 482.61","title":"Special Medical Record Requirements","tag":"psych","source":"SOM Appendix AA","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_aa_psyc_hospitals.pdf","body":[{"type":"std","text":"B103 | Condition-Level Guidance"},{"type":"p","text":"The clinical record must provide information indicating: need for admission and treatment; treatment goals; changes in treatment status; discharge planning; follow-up; and outcomes experienced by patients."},{"type":"p","text":"The structure and content must be an accurate functional representation of the patient's actual experience in the facility—containing enough information to demonstrate that the facility knows the patient's status, has adequate plans to intervene, and provides sufficient evidence of the effects of intervention."},{"type":"std","text":"§ 482.61(a) — Development of Assessment/Diagnostic Data (B104–B109)"},{"type":"p","text":"Medical records must stress the psychiatric components of the record, including history of findings and treatment provided for the psychiatric condition for which the patient is hospitalized."},{"type":"para","text":"(a)(1) Legal Status"},{"type":"p","text":"Legal status is defined by State statutes and dictates the circumstances under which the patient was admitted and/or is being treated (e.g., voluntary, involuntary, court-committed). Surveyors should determine through interview the terminology the facility uses for legal status and confirm that required evaluation and recertification documentation is present. Changes in legal status must be recorded with the date of change."},{"type":"para","text":"(a)(2) Provisional/Admitting Diagnosis"},{"type":"p","text":"An admission or working psychiatric diagnosis (including rule-out diagnoses), written in DSM or ICD nomenclature, must be entered at the time of the admission examination. The final diagnosis may differ if subsequent evaluation supports a change. If a diagnosis is absent, justification must be documented. Intercurrent (non-psychiatric) diagnoses must be documented when made. Attention should be paid to physical examination notes, known medical conditions, allergies, recent exposure to infections or substance abuse, and laboratory or test reports identifying abnormal findings."},{"type":"probe","text":"Probes §482.61(a)(2)"},{"type":"q","text":"Are abnormal physical examination findings and/or laboratory findings justified by further diagnostic testing and/or development of an intercurrent diagnosis, and if so, was such done?"},{"type":"q","text":"If an identified physical illness requires immediate treatment, is the treatment being given?"},{"type":"q","text":"How will an identified physical illness be likely to impact on the patient's eventual outcome? To what extent has this potential impact been addressed by the team?"},{"type":"para","text":"(a)(3) Reasons for Admission"},{"type":"p","text":"The record must document—preferably verbatim—statements and reasons for admission given by the patient, family, and others, with the informant identified. Records must not contain vague, ill-defined reports from unknown sources; they must record 'who,' 'what,' 'where,' 'when,' and 'why.'"},{"type":"probe","text":"Probes §482.61(a)(3)"},{"type":"q","text":"Can the patient describe problems, stresses, situations experienced prior to hospitalization, or do they still exist?"},{"type":"q","text":"Who is the informant? Did the informant witness the patient's behavior? If not, on what basis has the informant come to know the patient's behavior?"},{"type":"q","text":"Has staff elicited whether the patient has exhibited similar behavior previously? If so, what was different this time to make hospitalization necessary?"},{"type":"q","text":"Were there other changes/events in the patient's environment (death, separations of significant others) which contributed to the need for hospitalization? If so, has staff explored how these will impact the patient's treatment?"},{"type":"q","text":"Has there been an interruption or change in the patient's medication which may have been a factor in the patient's hospitalization?"},{"type":"para","text":"(a)(4) Social Service Records"},{"type":"p","text":"A psychosocial history/assessment must be completed on all patients. Three key components must be addressed: (A) Factual and Historical Information — specific reasons for admission or readmission, description of past and present biopsychosocial functioning, family and marital history and dynamics, pertinent religious and cultural factors, history of physical/sexual/emotional abuse, significant aspects of psychiatric/medical/substance abuse history, educational/vocational/employment/military service history, identification of community resources, identification of present environmental and financial needs; (B) Social Evaluation — patient strengths and deficits, high-risk psychosocial issues requiring early treatment planning; (C) Conclusions and Recommendations — anticipated necessary steps for discharge, high-risk issues requiring early intervention, specific community resources/support systems, anticipated social work role(s) in treatment and discharge planning."},{"type":"probe","text":"Probes §482.61(a)(4)"},{"type":"q","text":"Does the psychosocial history/assessment clearly identify the informant(s) and sources of information?"},{"type":"q","text":"Does it indicate whether information is considered reliable?"},{"type":"q","text":"Does it indicate patient participation to the extent possible in provision of data relative to treatment and discharge planning?"},{"type":"q","text":"Does it integrate significant data including identified high-risk psychosocial issues (problems) into the treatment plan?"},{"type":"q","text":"How does the hospital ensure the information is reliable?"},{"type":"para","text":"(a)(5) Neurological Examination"},{"type":"p","text":"When indicated, a complete neurological examination must be recorded at the time of the admission physical examination. A 'screening' neurological exam assesses gross function of the various divisions of the central nervous system; statements such as 'Cranial Nerves II–XII intact' alone are not acceptable. If positive neurological symptomatology is found, a more detailed examination must be ordered. A complete, comprehensive neurological examination is a detailed, orderly survey of all sections of the nervous system, requiring a physician who reviews the patient's full history and psychiatric evaluation."},{"type":"probe","text":"Probes §482.61(a)(5)"},{"type":"q","text":"Did the presence of an abnormal physical finding or laboratory finding justify the need for further diagnostic testing, or for the development of an intercurrent diagnosis? If the finding justified further follow-up, was such follow-up done?"},{"type":"q","text":"Is there evidence that a screening neurological examination was done and recorded at the time of the physical examination?"},{"type":"q","text":"Was the screening neurological or history indicative of possible involvement (tremors, paralysis, motor weakness or muscle atrophy, severe headaches, seizures, head trauma)?"},{"type":"q","text":"If indicated, was a complete, comprehensive neurological exam ordered, completed, and recorded in the medical record in a timely manner?"},{"type":"std","text":"§ 482.61(b) — Psychiatric Evaluation (B110–B117)"},{"type":"p","text":"The psychiatric evaluation is a total appraisal of the patient's illness performed to determine diagnosis and treatment. It must contain sufficient information to justify the diagnosis and planned treatment, and must include a biographical-historical perspective of the patient's personality as a specific human being. A physician signature is required; where a non-physician performs the mental status portion, they must be credentialed by the hospital, legally authorized by the State, and physician countersignature must be present where required by policy or State law."},{"type":"p","text":"The psychiatric evaluation should include: the patient's chief complaints/reaction to hospitalization (in patient's own words); past history of psychiatric problems and treatment; past family, educational, vocational, occupational and social history; and all information necessary to justify the diagnosis and treatment."},{"type":"probe","text":"Probes §482.61(b) — General"},{"type":"q","text":"Why is the patient in the hospital? Was it his/her idea? Is the patient in the hospital against his/her will? Who decided to hospitalize and why?"},{"type":"q","text":"Has the patient been chronically ill? Continuously/repeatedly? How severely has past illness/treatment interfered with the patient's development and/or adjustment?"},{"type":"q","text":"Are there persistent symptoms/signs/behaviors that must be addressed and treated in order to favorably impact the future psychiatric course?"},{"type":"q","text":"What medications or supports helped the patient improve in the past? Are the same resources available for this episode?"},{"type":"q","text":"What is the patient's educational level? What jobs has the patient held? How does the patient get along with people?"},{"type":"q","text":"Within the psychiatric evaluation, do one find the specific signs and symptoms, and other factors, that justify the diagnosis?"},{"type":"para","text":"(b)(1) Timing"},{"type":"p","text":"Must be completed within 60 hours of admission."},{"type":"para","text":"(b)(2) Medical History"},{"type":"p","text":"Must include the non-psychiatric medical history including physical disabilities, intellectual disabilities, and treatment."},{"type":"probe","text":"Probes §482.61(b)(2)"},{"type":"q","text":"Does the evaluation include relevant past surgery and past medical conditions and disabilities, especially those of a chronic nature?"},{"type":"q","text":"Have these conditions contributed to the patient's psychiatric condition? How?"},{"type":"q","text":"Are any of these conditions still present to a significant degree? Are they likely to impact the patient's recovery/remission? Should they be addressed immediately? Does the facility have the capability to intervene?"},{"type":"para","text":"(b)(3) Mental Status"},{"type":"p","text":"Must describe the appearance and behavior, emotional response, verbalization, thought content, and cognition of the patient as reported by the patient and observed by the examiner at the time of the examination. Simply stating conclusions (e.g., 'oriented, memory intact, judgment poor, insight nil') without supporting clinical narrative is not acceptable."},{"type":"para","text":"(b)(4) Onset of Illness"},{"type":"p","text":"Must include history of present illness: onset, precipitating factors, reason for current admission, signs and symptoms, course, and results of any treatment received."},{"type":"probe","text":"Probes §482.61(b)(4)"},{"type":"q","text":"How long has the patient been ill? Was it a gradual or sudden onset? Is this a recurrence?"},{"type":"q","text":"What were the precipitating factors? What happened?"},{"type":"q","text":"What symptoms, signs, behaviors made this hospitalization necessary?"},{"type":"q","text":"What treatment has the patient already received before coming to the hospital? Is any medication received listed?"},{"type":"para","text":"(b)(5) Attitudes and Behavior"},{"type":"p","text":"The problem statement should describe behaviors requiring change for the patient to function in a less restrictive setting, including behavioral or relationship difficulties with significant others requiring active treatment to facilitate successful discharge."},{"type":"para","text":"(b)(6) Intellectual Functioning, Memory, and Orientation"},{"type":"p","text":"Refer to guidance for § 482.61(b)(3). These elements must be substantiated with clinical narrative, not just conclusory labels."},{"type":"para","text":"(b)(7) Inventory of Patient Assets"},{"type":"p","text":"Assets must be described in descriptive, not interpretive fashion. Only personal factors usable in therapy qualify as 'strengths'—knowledge, interests, skills, aptitudes, personal experiences, education, talents, and employment status. Words such as 'youth,' 'pretty,' 'Social Security income,' and 'has a car' do not represent assets."},{"type":"std","text":"§ 482.61(c) — Treatment Plan (B118–B125)"},{"type":"p","text":"The patient and treatment team collaboratively develop the treatment plan—the outline of what the hospital has committed to do for the patient, based on assessment of needs. There must be evidence of periodic review of the patient's response and progress; if progress is made or lacking, the review must justify continuing current goals or revising the plan. The interval for treatment plan reviews is determined by the hospital, but must be sufficiently responsive to ensure review whenever: a goal is accomplished; the patient is regressing; the patient is failing to progress; or a new treatment goal is required."},{"type":"sp","text":"Survey Procedure §482.61(c)(1) — Compliance Determination Method"},{"type":"sp_p","text":"1. Observation of patient and staff at planned therapies/meetings, in formal and informal settings on and off units."},{"type":"sp_p","text":"2. Interviews with patients, families, treatment staff, and others involved in active treatment."},{"type":"sp_p","text":"3. Review of scheduled treatment programs (individual, group, family meetings, therapeutic activities, therapeutic procedures)."},{"type":"sp_p","text":"4. Attendance at multidisciplinary treatment planning meetings, if time permits."},{"type":"sp_p","text":"5. Medical record review."},{"type":"probe","text":"Probe §482.61(c)(1)"},{"type":"q","text":"Has the information gained from assessing/evaluating the patient been utilized to create an individualized treatment plan?"},{"type":"para","text":"(c)(1) Plan Must Be Based on Strengths and Disabilities"},{"type":"p","text":"'Disability' means any psychiatric or biopsychosocial problem requiring treatment/intervention (used interchangeably with 'problem'). The treatment plan is derived from the psychiatric evaluation and assessments/diagnostic data collected by the total treatment team. Patient strengths that can be utilized in treatment must be identified. Treatment planning depends on whether the admission is for crisis intervention, short-term treatment, or long-term treatment."},{"type":"probe","text":"Probes §482.61(c)(1) — Strengths and Disabilities"},{"type":"q","text":"Is the treatment plan individualized (patient-specific), or is there a predictable sameness from plan to plan?"},{"type":"q","text":"When packaged plans or programs are used, do staff include needed individual adaptations in the plan?"},{"type":"q","text":"Are the patient's observed behaviors consistent with the problems and strengths identified in the plan or update?"},{"type":"q","text":"Have the views which the patient communicated to the surveyor regarding problems requiring treatment and plans for discharge been incorporated in the plan or update?"},{"type":"para","text":"(c)(1)(i) Substantiated Diagnosis"},{"type":"p","text":"The substantiated diagnosis is the diagnosis identified by the treatment team to be the primary focus for treatment planning. It evolves from synthesis of data from various disciplines. Rule-out diagnoses alone are not acceptable as a substantiated diagnosis. At the time of treatment planning, a substantiated diagnosis must be recorded; it may be the same as or different from the initial diagnosis."},{"type":"probe","text":"Probes §482.61(c)(1)(i)"},{"type":"q","text":"What specific problems will be treated during the patient's hospitalization?"},{"type":"q","text":"Does the treatment plan identify and precisely describe problem behaviors rather than generalized statements (i.e., 'paranoid,' 'aggressive,' 'depressed') or generic terminology (i.e., 'alteration in thought process,' 'ineffective coping')?"},{"type":"q","text":"Are physical problems identified and included in the treatment plan if they require treatment or interfere with treatment during hospitalization?"},{"type":"para","text":"(c)(1)(ii) Short-Term and Long-Range Goals"},{"type":"p","text":"Goals must include specific dates for expected achievement, be stated as observable and measurable patient behaviors, and be related to identified problems. The long-range goal is achieved through a series of short-term goals. As goals are achieved, the treatment plan should be revised. In crisis/short-term stays, there may be only one timeframe."},{"type":"probe","text":"Probes §482.61(c)(1)(ii)"},{"type":"q","text":"How do treatment plan goals relate to the problems being treated?"},{"type":"q","text":"Do goals indicate the outcomes to be achieved by the patient?"},{"type":"q","text":"Are the goals written in a way that allows changes in the patient's behavior to be measured?"},{"type":"q","text":"If not apparent, what criteria do staff use to measure success?"},{"type":"q","text":"How relevant are the treatment plan goals to the patient's condition?"},{"type":"para","text":"(c)(1)(iii) Specific Treatment Modalities"},{"type":"p","text":"All planned treatment modalities must be identified. Simply 'naming' modalities (e.g., 'individual therapy, group therapy, occupational therapy') is not acceptable—the focus of the treatment must be included. Simply 'stating' generic approaches (e.g., 'set limits,' 'encourage socialization') is not acceptable; approaches must be specifically described. A daily schedule of unit activities does not in itself constitute planned modalities."},{"type":"probe","text":"Probes §482.61(c)(1)(iii)"},{"type":"q","text":"Are qualified staff observed following the methods, approaches, and staff interventions as stated?"},{"type":"q","text":"Can staff explain the focus of the modality they have provided?"},{"type":"q","text":"Are observed treatment methods, approaches, and interventions from all disciplines included in the plan?"},{"type":"q","text":"Do the pieces of the treatment plan work together to achieve the greatest possible gain for the patient?"},{"type":"q","text":"Do the disciplines present at observed treatment planning meetings represent all of the patient's needs?"},{"type":"q","text":"Is the patient included in the decision-making whenever possible?"},{"type":"q","text":"How does the patient get to know his/her treatment regime?"},{"type":"para","text":"(c)(1)(iv) Responsibilities of Each Team Member"},{"type":"p","text":"Each individual on the treatment team primarily responsible for ensuring compliance with particular aspects of the patient's individualized treatment program must be identified by name and discipline. The patient, as well as family/significant others, should be aware of the staff responsible for various aspects of treatment."},{"type":"probe","text":"Probes §482.61(c)(1)(iv)"},{"type":"q","text":"Are staff who are designated in the treatment plan observed carrying out treatment activities and therapies? Is the information in the plan consistent with surveyor observations?"},{"type":"q","text":"Are the patients able to name the staff responsible for implementing their treatment? Is this information consistent with the treatment plan?"},{"type":"para","text":"(c)(1)(v) Adequate Documentation"},{"type":"p","text":"When progress and treatment notes are reviewed, the content of the notes must relate to the treatment plan, indicating what hospital staff is doing to carry out the treatment plan and the patient's response to the interventions."},{"type":"probe","text":"Probes §482.61(c)(1)(v)"},{"type":"q","text":"Are the treatment notes relative to the identified problems?"},{"type":"q","text":"Are the treatment notes indicative of the patient's response to treatment?"},{"type":"q","text":"Do the progress notes relate to specific patient problems or progress?"},{"type":"para","text":"(c)(2) Active Treatment Documentation"},{"type":"p","text":"Active treatment is a clinical process involving ongoing assessment, diagnosis, intervention, evaluation, and discharge planning under the direction of a psychiatrist. The record must indicate adherence to the patient's right to be counseled about medication (intended effects and potential side effects). Treatment notes document provision of and patient response to a specific modality. Progress notes give a chronological picture of progress toward treatment plan goals. A combined treatment and progress note may be written."},{"type":"probe","text":"Probes §482.61(c)(2)"},{"type":"q","text":"Does the patient know his/her diagnosis?"},{"type":"q","text":"What did the patient contribute to the formulation of the treatment plan? Goals of treatment?"},{"type":"q","text":"If the patient receives medication, does the patient understand the reason for the medication, the name, the dose, the time of administration, the desired effects, and the potential side effects?"},{"type":"q","text":"If medication is changed, is there a rationale for the change?"},{"type":"q","text":"Are staff members recording their observations relative to the patient's response to the treatment modalities, including medication?"},{"type":"q","text":"Is there evidence that the patient was afforded the opportunity to participate in his/her plan of care?"},{"type":"q","text":"What progress has the patient made? Has the patient achieved his/her optimal level of functioning? If not, why? Are these reasons/barriers reflected in the current treatment plan?"},{"type":"q","text":"If a restrictive procedure is used (e.g., restraint and/or seclusion), is there evidence that attempts were made systematically to treat the patient in the least restrictive manner?"},{"type":"q","text":"Is there evidence that the rights of the patient were protected while in the restrictive setting in accordance with Federal and State law and accepted standards of practice?"},{"type":"std","text":"§ 482.61(d) — Recording Progress (B126–B132)"},{"type":"p","text":"Progress notes must give a chronological picture of the patient's progress or lack of progress toward attaining short- and long-range goals. Notes stating 'patient slept well' or 'no complaints' constitute observations only and do not indicate how the patient is responding to treatment. Frequency alone does not determine adequacy—expect greater frequency when patients are more acutely ill or in crisis. Notes must be dated and signed with signature and title or discipline."},{"type":"p","text":"Required note authors: (1) the MD/DO responsible for the patient's care; (2) nurse; (3) social worker; (4) when appropriate, others significantly involved in active treatment modalities."},{"type":"p","text":"Minimum frequency: at least weekly for the first 2 months, at least once a month thereafter."},{"type":"p","text":"Notes must contain: (1) recommendations for revisions in the treatment plan as indicated; (2) a precise assessment of the patient's progress in accordance with the original or revised treatment plan."},{"type":"probe","text":"Probes §482.61(d)"},{"type":"q","text":"Are the physicians who are significantly involved in active treatment modalities/interventions actually documenting progress?"},{"type":"q","text":"Are the nurses who are significantly involved in active treatment modalities/interventions actually documenting progress?"},{"type":"q","text":"Are the social workers significantly involved in active treatment modalities/interventions actually documenting progress?"},{"type":"q","text":"Are staff from other disciplines (e.g., rehabilitative therapy and psychology) which are significantly involved in active treatment modalities/interventions actually documenting progress?"},{"type":"q","text":"Do the progress notes relate to the goals of the treatment plan? Do they include precise statements of progress?"},{"type":"q","text":"Is there a correlation between what is observed by the surveyor and what is described in the notes?"},{"type":"q","text":"Do the notes give a clear picture of the patient's progress or lack thereof during the course of hospitalization?"},{"type":"q","text":"In reviewing the patient's progress, are aftercare/discharge plans being evaluated?"},{"type":"q","text":"Do the progress notes contain documentation substantiating changes/revisions in the treatment plan and subsequent assessment of the patient's responses and progress?"},{"type":"std","text":"§ 482.61(e) — Discharge Planning and Discharge Summary (B133–B135)"},{"type":"p","text":"The discharge summary must contain: (1) a recapitulation of the patient's hospitalization—summary of circumstances and rationale for admission, synopsis of accomplishments as reflected through the treatment plan, reasons for admission, treatment achieved, baseline of psychiatric/physical/social functioning at discharge, evidence of patient/family response to interventions; (2) recommendations from appropriate services concerning follow-up or aftercare; (3) a brief summary of the patient's condition on discharge."},{"type":"p","text":"Aftercare recommendations must describe services and supports effective on the day of discharge, including: complete description of arrangements with treatment and community resources for follow-up services; a plan outlining psychiatric/medical treatment and medication regimen; specific appointment date(s) and names and addresses of service provider(s); description of community housing/living arrangement; economic/financial status or plan; recreational and leisure resources; and a complete description of the involvement of family and significant others post-discharge."},{"type":"probe","text":"Probes §482.61(e)"},{"type":"q","text":"How does the discharge planning process verify appointment source(s), dates, and addresses?"},{"type":"q","text":"How was the patient involved in the discharge and aftercare planning process?"},{"type":"q","text":"Were discharge-related documents made available to the patient, family, community treatment source, and/or other appropriate sources?"},{"type":"q","text":"Is there indication that the discharge planning process included participation of multidisciplinary staff and the patient? Have the results been communicated to the post-hospital treatment entity?"},{"type":"q","text":"Is there evidence that contact with the post-hospital treatment entity included communication of treatment recommendations (including information regarding the patient's medications)?"},{"type":"q","text":"Is a contact person named, and does the patient have a specific appointment date and time for the initial follow-up visit?"}]},{"id":"ig-482-62","citation":"§ 482.62","title":"Special Staff Requirements","tag":"psych","source":"SOM Appendix AA","link":"https://www.cms.gov/regulations-and-guidance/guidance/manuals/downloads/som107ap_aa_psyc_hospitals.pdf","body":[{"type":"std","text":"B136 | Condition-Level Guidance"},{"type":"p","text":"The purpose of this CoP is to ensure the psychiatric hospital is adequately staffed with qualified mental health professionals and supportive staff to carry out an intensive and comprehensive active treatment program and to protect and promote the physical and mental health of patients. 'Adequate numbers' means the numbers and deployment of staff with qualifications to evaluate, plan, implement, and document active treatment—not numbers alone."},{"type":"sp","text":"Survey Procedure §482.62 — Assessment Method"},{"type":"sp_p","text":"1. Observe sampled patients and others during structured sessions and in unstructured settings for behavioral evidence of a rational organization of resources."},{"type":"sp_p","text":"2. Interview patients and staff to determine whether necessary treatment modalities and services are being provided in a timely manner."},{"type":"sp_p","text":"3. Review medical records of patients in the sample to ascertain if active treatment assessments, treatments, evaluations, and activities have been conducted and documented."},{"type":"sp_p","text":"4. Review other records such as restraint and seclusion records, incident reports, medication error reports, patient/staff injury reports to determine the extent to which staffing levels or deployment contributed to negative patient outcomes."},{"type":"sp_p","text":"5. Evaluate all outcome data in light of the success or failure observed during the survey relevant to each patient receiving active treatment. This is the primary basis for evaluating the adequacy of staffing under this Special Condition."},{"type":"std","text":"§ 482.62(a) — Personnel (B137–B140)"},{"type":"para","text":"(a)(1) Evaluate Patients"},{"type":"p","text":"Staff must be sufficient to assure that the admission work-ups (assessment, diagnostic data gathering) are completed in a timely manner, and that continuing evaluation of the patient's progress and response to treatment is occurring."},{"type":"probe","text":"Probes §482.62(a)(1)"},{"type":"q","text":"Is there adequate staff to assure that admission work-ups are completed in a timely manner?"},{"type":"q","text":"Is there evidence that there is continuing evaluation of the patient's progress and response to treatment?"},{"type":"q","text":"Are evaluations delayed or absent?"},{"type":"para","text":"(a)(2) Formulate Written Individualized, Comprehensive Treatment Plans"},{"type":"p","text":"Staffing must be sufficient so that members of the patient's treatment team and others responsible for evaluation and assessment can contribute their respective data for consideration in the formulation of the treatment plan."},{"type":"probe","text":"Probes §482.62(a)(2)"},{"type":"q","text":"Was there sufficient discipline participation at the treatment team meeting to assure formulation of a treatment plan that meets the patient's individualized needs?"},{"type":"q","text":"What problems prevent staff members from attending treatment meetings? Do they relate to staffing?"},{"type":"q","text":"Are the assessments/evaluations absent or delayed to the extent that they are not useful to the treatment team for the purpose of planning individualized treatment?"},{"type":"para","text":"(a)(3) Provide Active Treatment Measures"},{"type":"p","text":"Active treatment occurs when the patient receives treatment interventions delivered under physician direction, specific to patient strengths, disabilities, and problems identified in the treatment plan, in accordance with accepted standards. Treatment must be individualized—several patients may attend the same group, but the focus of discussion and therapeutic intervention may differ depending on the individual patient's particular issue. Expect to see treatment focused on the unique needs of individual patients."},{"type":"probe","text":"Probes §482.62(a)(3)"},{"type":"q","text":"Through observation, interviews, and record reviews, can you determine that patients receive active treatment?"},{"type":"q","text":"Is the distribution of staff consistent with particular patient needs? Is appropriate staffing sufficient to carry out treatment plans?"},{"type":"q","text":"Does the patient attend therapies that are relevant to the identified problems that brought the patient to the hospital?"},{"type":"q","text":"Are staff absences and/or vacancies preventing the patient from receiving active treatment? Are patients not attending therapeutic activities off the unit because there is no staff to escort them?"},{"type":"q","text":"Are patients observed not engaged in activities while staff attend to administrative tasks?"},{"type":"q","text":"Are active treatment sessions or activities carried out at discrete time intervals exclusively, or is active treatment implemented as the patient's needs emerge during the course of the day as well?"},{"type":"q","text":"Does a review of quality assurance data reveal a pattern of serious incidents occurring on particular shifts and/or days of the week?"},{"type":"q","text":"What do patients report to the surveyor are their treatment modalities? Do patient interviews indicate that patients believe the treatment being provided is helpful?"},{"type":"q","text":"Does the scheduling of activities and their content relate directly to the patient's treatment objectives, or are the activities/content generalized, non-therapeutic 'time-fillers'?"},{"type":"q","text":"Is there a consistent, observable pattern of evidence that hospital staff provide, reinforce, and otherwise implement measures to achieve active treatment objectives?"},{"type":"para","text":"(a)(4) Engage in Discharge Planning"},{"type":"p","text":"The patient together with all relevant professionals caring for the patient should be expected to participate in the discharge planning process. Staffing should be sufficient to facilitate this outcome to the maximum extent possible."},{"type":"probe","text":"Probes §482.62(a)(4)"},{"type":"q","text":"Do patients participate in their discharge planning process? If not, why?"},{"type":"q","text":"Do staff interviews elicit information that staff working with patients are aware of the discharge plans for those patients?"},{"type":"q","text":"Do record review and interviews indicate that all relevant staff have participated in discharge planning?"},{"type":"std","text":"§ 482.62(b) — Director of Inpatient Psychiatric Services; Medical Staff (B141–B144)"},{"type":"p","text":"Inpatient psychiatric services must be under the supervision of a clinical director, service chief, or equivalent qualified to provide leadership for an intensive treatment program. The clinical director is ultimately responsible for medical and psychiatric care provided to patients, must ensure quality improvement programs monitor all areas of patient care, and must implement educational programs for all staff levels. Inpatient psychiatric services include: admission interviews, assessments, psychiatric and medical work-ups, treatment team leadership, medication management, on-call emergency treatment, individual/group/family therapies, clinical supervision, and educational conferences."},{"type":"sp","text":"Survey Procedure §482.62(b) — Meeting with Clinical Director"},{"type":"sp_p","text":"Just prior to the end of the survey, schedule a meeting with the clinical director. By this time you should have conducted required observations, interviews, and record reviews for at least a majority of sampled patients. Collect information regarding: the qualifications of the clinical director; the leadership exhibited for the scope of psychiatric/medical treatment programs needed by patients; and the rationale for medical staffing coverage."},{"type":"para","text":"(b)(1) Qualifications of Clinical Director"},{"type":"p","text":"Must meet training and experience requirements for examination by the American Board of Psychiatry and Neurology (ABPN) or the American Osteopathic Board of Neurology and Psychiatry. This requires: unrestricted license; graduation from AMA- or AOA-approved medical school; successful completion of an approved psychiatric residency (≥3 years before 1988; ≥4 years after 1988). Actual board certification satisfies this requirement; evidence of eligibility for the board examination also satisfies it."},{"type":"sp","text":"Survey Procedure §482.62(b)(1) — Credential Review"},{"type":"sp_p","text":"Review the clinical director's personnel folder or ask whether he/she has: (a) certification of the ABPN and/or American Osteopathic Board of Neurology and Psychiatry; (b) if not certified, evidence that the person took the Boards (would satisfy training and equivalency); or (c) medical school and residency training documentation."},{"type":"para","text":"(b)(2) Quality Monitoring by Director"},{"type":"p","text":"The director must monitor and evaluate the quality and appropriateness of services and treatment provided by the medical staff, in accordance with acceptable standards of practice. In states where psychologists have admitting privileges, the clinical director retains oversight responsibility."},{"type":"probe","text":"Probes §482.62(b)(2)"},{"type":"q","text":"What mechanisms does the director use to monitor and evaluate the work of the medical staff (personal interviews, Quality Improvement reports, incident reports)?"},{"type":"q","text":"When problems are discovered by the clinical director, how are they corrected?"},{"type":"q","text":"Are services, notes, and reports timely?"},{"type":"q","text":"Are medications used appropriately for the patient's diagnosis?"},{"type":"para","text":"(b) Adequacy of Medical Staff"},{"type":"p","text":"The number and qualifications of MD/DOs must be adequate to provide essential psychiatric services, considering: (1) number of admissions, discharges, and current patients by treatment unit; (2) size of the hospital; (3) geographic proximity of the wards and units; (4) organization and kinds of treatment services rendered; (5) availability of physician coverage on evenings, nights, and weekends; (6) availability of physicians for treatment planning; (7) availability of psychiatrists to consult with non-psychiatric physicians about psychotropic medication regimens; (8) availability of physicians to consult with multi-disciplinary staff about treatment issues."},{"type":"probe","text":"Probes §482.62(b) — Medical Staff"},{"type":"q","text":"How many staff are board certified? Fully trained? How many full-time/part-time specialties are represented?"},{"type":"q","text":"How are medical staff deployed? To what programs/units are they assigned? Why?"},{"type":"q","text":"How much time do physicians spend on the units? Based on observations, interviews, and medical record reviews, is coverage adequate to meet the needs of sampled patients?"},{"type":"std","text":"§ 482.62(c) — Availability of Medical Personnel (B145)"},{"type":"p","text":"MD/DOs and other appropriate professional personnel must be available to provide necessary medical and surgical diagnostic and treatment services. If not available within the institution, there must be an agreement with an outside source for immediate availability, or a satisfactory arrangement for transferring patients to a Medicare-participating general hospital."},{"type":"probe","text":"Probes §482.62(c)"},{"type":"q","text":"How did the hospital meet the medical/surgical/diagnostic needs represented by each patient in the sample? Were these done timely? Appropriately?"},{"type":"q","text":"If contracts are not current or available, how are these services provided for the patient? Is there evidence of negative outcomes as a result of these arrangements?"},{"type":"q","text":"Are reports from other services such as pharmacy, radiology, and clinical laboratory timely? Appropriate?"},{"type":"std","text":"§ 482.62(d) — Nursing Services (B146–B150)"},{"type":"p","text":"Psychiatric nursing functions include: supervision of paraprofessional staff; assessment, planning, provision, and evaluation of psychiatric nursing care; medication teaching; management of the therapeutic milieu; mandatory and voluntary in-service training; and provision of specialized treatments requiring clinical expertise of a professional psychiatric nurse. Expect to see evidence of orientation programs and ongoing continuing education for LPNs and mental health workers emphasizing individualized treatment interventions."},{"type":"para","text":"(d)(1) Director of Psychiatric Nursing Services"},{"type":"p","text":"Must be an RN with a master's degree in psychiatric or mental health nursing from an NLN-accredited school, or be qualified by education and experience in care of the mentally ill. If the DON has less than a master's degree in psychiatric nursing, expect to see evidence of ongoing training; documented consultation from a master's-prepared psychiatric nurse constitutes ongoing training. The DON must demonstrate competence in interdisciplinary treatment plan formulation, skilled nursing care and therapy, and direction, monitoring, and evaluation of nursing care."},{"type":"probe","text":"Probes §482.62(d)(1)"},{"type":"q","text":"Are nursing assessments completed on all patients?"},{"type":"q","text":"Do the multidisciplinary treatment plans reflect nursing input including specific nursing interventions for nursing problems (e.g., violence toward self/others, physical/medical crises)?"},{"type":"q","text":"Is nursing care evaluated by an RN, with changes in care based on the patient's progress or lack thereof?"},{"type":"q","text":"Are intrusive techniques (e.g., seclusion, restraint, ECT, and/or medical procedures) and patient incidents (e.g., medication errors, patient falls, patient-to-patient and patient-to-staff injuries) monitored in accordance with hospital policy, State statutes, and safe nursing practice?"},{"type":"q","text":"Are nursing personnel observed relating to patients in a therapeutic manner?"},{"type":"para","text":"(d)(2) Staffing Requirements"},{"type":"p","text":"A registered nurse must be available 24 hours each day. Adequate numbers of RNs, LPNs, and mental health workers must be available to provide the nursing care necessary under each patient's active treatment program. Evaluation of sufficiency considers patient characteristics from observations, interviews, and medical records. Mental health workers must have education, experience, and/or training in psychiatric care and must be assigned duties reflecting their educational level and psychiatric training."},{"type":"sp","text":"Survey Procedure §482.62(d)(2) — Staffing Review"},{"type":"sp_p","text":"Review nursing staffing patterns on a sample of approximately 25% of certified wards. Review staffing for the day(s) of the survey and evaluate based on patient needs. If a problem or concern is evidenced, review additional data."},{"type":"sp_p","text":"If observations and/or interviews indicate a staffing problem, consider the following variables: organization and types of services provided by nursing; number and levels of nursing care needs including average length of stay and acuity; number and levels of nursing personnel based on roles and functions required; number of suicidal/assaultive patients; seclusion/restraint incidents; number of admissions and discharges; number and type of accidents and/or injuries; amount and complexity of medication regimens; medication errors; use of PRN medications; medical (physical) procedures; assignment and utilization of pool nursing personnel; availability of RNs to supervise/consult with nursing/non-nursing personnel; availability of RNs to assess and implement care in crisis situations; and involvement of patients with personnel."},{"type":"probe","text":"Probes §482.62(d)(2)"},{"type":"q","text":"Are personnel interacting with patients? Are patients involved in structured activities?"},{"type":"q","text":"Are patients lying in beds/on floors, sitting alone, fighting and arguing?"},{"type":"q","text":"When interviewing/observing staff, do they interact therapeutically with patients?"},{"type":"q","text":"Why have nursing staff been deployed in the manner that they have?"},{"type":"std","text":"§ 482.62(e) — Psychological Services (B151)"},{"type":"p","text":"The hospital must provide or have available psychological services to meet patient needs. Services may include: diagnostic testing and diagnostic formulations on physician request; individual, group, and family therapies; participation in multidisciplinary treatment conferences; and program development and evaluation. The number of full-time, part-time, and consulting psychologists must be adequate; arrangements with outside resources must assure necessary patient services will be provided."},{"type":"probe","text":"Probes §482.62(e)"},{"type":"q","text":"Did the patients in the sample have a need for psychological services or testing? Were they provided in a timely manner and with sufficient intensity?"},{"type":"q","text":"Did any of the patients in the sample indicate a need for psychological services, but none were requested?"},{"type":"q","text":"What types of psychological services are offered (e.g., assessments, therapy)?"},{"type":"q","text":"Do certain groups of patients receive testing routinely (dementia, children, adolescents)? Why?"},{"type":"q","text":"Once tests are performed, are results reported in sufficient time to be integrated into the patient's active treatment and treatment plan?"},{"type":"q","text":"How does the hospital or Psychological Service Department determine whether it meets the needs of patients? Whether its services are underutilized or over-utilized?"},{"type":"q","text":"Why have psychological services staff been deployed in the manner that they have?"},{"type":"std","text":"§ 482.62(f) — Social Services (B152–B155)"},{"type":"p","text":"Social work functions include: intake/admission screening; psychosocial assessment; developing an update or detailed re-assessment; high-social risk case finding; contact with family and significant others; patient and family education, support, and advocacy; coordination/liaison with community-based agencies; participation as a treatment team member; provision of supportive/individual/couple/family/group therapy; case management; and post-discharge follow-up. Continuity of care is a key social work principle. When non-social workers perform these duties, the Director of Social Work or an MSW-qualified supervisor must be involved to oversee quality."},{"type":"sp","text":"Survey Procedure §482.62(f) — Meeting with Director of Social Work"},{"type":"sp_p","text":"Just prior to the end of the survey, schedule a meeting with the Director of Social Work. By this time you should have conducted required observations, interviews, and record reviews for at least a majority of sampled patients. Collect information regarding: the qualifications of the director; the leadership exhibited for the scope of services needed by the patient; and the rationale for social work staffing coverage."},{"type":"probe","text":"Probes §482.62(f)"},{"type":"q","text":"How does the director periodically audit the quality of social work services furnished?"},{"type":"q","text":"What are the outcomes of audits conducted? What percentage of psychosocial assessments was completed and available in written form at the time of the interdisciplinary treatment plan?"},{"type":"q","text":"How does the patient's social needs as addressed by the social worker in the psychosocial assessment compare against the goals developed in the interdisciplinary treatment plan?"},{"type":"q","text":"Has social work staff provided active treatment in accordance with the patient's treatment plan?"},{"type":"para","text":"(f)(1) Director Qualifications"},{"type":"p","text":"Must have a master's degree from an accredited school of social work, or be qualified by education and experience in the social services needs of the mentally ill. If the director does not hold an MSW, at least one staff member must have this qualification. Duties and responsibilities must be clearly delineated in facility policies and procedures."},{"type":"probe","text":"Probes §482.62(f)(1)"},{"type":"q","text":"What are the director's qualifications, experience, and scope of duties within this position?"},{"type":"q","text":"If a MSW staff member other than the director is performing any of these duties, what are this staff member's experience and scope of duties performed? Why were these duties delegated?"},{"type":"q","text":"To what extent is the director knowledgeable of the social work needs of the various wards?"},{"type":"q","text":"Why has the social work staff and services provided throughout the hospital been deployed in the manner they have?"},{"type":"para","text":"(f)(2) Staff Responsibilities"},{"type":"p","text":"Social work contact with the patient, family, and significant others should occur during or as soon as possible after admission. High-risk case finding should result in significant data being available for early integration into the treatment plan. Social work staff responsibilities must include: participating in discharge planning; arranging for follow-up care; and developing mechanisms for exchange of appropriate information with sources outside the hospital."},{"type":"probe","text":"Probes §482.62(f)(2)"},{"type":"q","text":"Are social work staff routinely involved in providing services to the patient that are identified in the treatment plan?"},{"type":"q","text":"To what extent do social work staff provide discharge planning services to the patient, such as supportive therapy focused on discharge goals, and carrying out a liaison role with community resource providers?"},{"type":"q","text":"Have social work staff assured that adequate information is provided to post-hospital patient service providers?"},{"type":"std","text":"§ 482.62(g) — Therapeutic Activities (B156–B158)"},{"type":"p","text":"A variety of therapeutic and rehabilitative activities are selectively used as therapeutic tools in providing active treatment. Therapeutic activities focus on development and maintenance of adaptive skills to improve patient functioning. Leisure activities provide individualized opportunities to acquire knowledge, skills, and attitudes about meaningful leisure involvement. Rehabilitative services may include educational, occupational, recreational, physical, art, dance, music, and speech therapies, and vocational rehabilitation."},{"type":"para","text":"(g)(1) Program Appropriateness"},{"type":"p","text":"The program must be appropriate to patient needs and interests, directed toward restoring and maintaining optimal physical and psychosocial functioning. The hospital is responsible for ensuring consistent availability and provision of individualized therapeutic activities and rehabilitative services based on patient needs. Selection of modalities must be based on patient need and goals set in the patient's treatment plan."},{"type":"probe","text":"Probes §482.62(g)(1)"},{"type":"q","text":"Are activity areas/sites accessible and available to meet the patient's individual needs? Are the facilities and resources adequate to enable implementation of goals set in the treatment plan?"},{"type":"q","text":"Does the program utilize available community resources to provide opportunities for socialization, leisure, and therapeutic activities for patients who can participate outside the hospital setting?"},{"type":"q","text":"Are current activity schedules clearly posted for patient and staff reference and use? Are the scheduled activities related to the particular patient area and specific treatment needs of patients?"},{"type":"q","text":"Are patient needs met consistently at all times including evenings and weekends?"},{"type":"q","text":"If a large number of patients are assigned to the same therapeutic activity, do patients have individualized goals within their treatment plans?"},{"type":"para","text":"(g)(2) Staffing Adequacy"},{"type":"p","text":"The number of qualified the
